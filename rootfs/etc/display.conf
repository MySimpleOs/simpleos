# SimpleOS display policy (read from initrd as /etc/display.conf).
# Physical scanout still comes from the bootloader framebuffer until a KMS
# driver exists; these values define the nominal desktop + refresh target
# for compositor pacing and logging. Edit, rebuild initrd (or refresh
# rootfs), reboot to apply.
#
# Primary display (author machine — change for yours):
width=2560
height=1440
refresh_hz=185
label=primary
