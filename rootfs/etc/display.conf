# Display + pointer policy (initrd /etc/display.conf).
#
# pointer=auto (default): virtio-tablet if present (QEMU), else xHCI USB probe
# (stub — no USB mice yet), else PS/2 aux. Real laptops: many touchpads are
# I2C HID (no PS/2 bytes); USB mice need a future xHCI HID driver — until then
# only PS/2 or BIOS “Legacy USB → PS/2” emulation may move the cursor.
# pointer=ps2 skips virtio/USB; pointer=virtio requires virtio-tablet device.
width=1920
height=1080
refresh_hz=60
vsync=1
pointer=auto
label=primary
