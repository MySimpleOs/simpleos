# Display + pointer policy (initrd /etc/display.conf).
#
# pointer=auto: virtio-tablet (QEMU), else xHCI HID boot mouse on root ports,
# else PS/2 aux. Many laptop touchpads are I2C HID (not USB root / not PS/2)
# — those need a future I2C driver; external USB mice should use xhci path.
# pointer=ps2 skips virtio/USB; pointer=virtio requires virtio-tablet device.
width=1920
height=1080
refresh_hz=60
vsync=1
pointer=auto
label=primary
